<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 612" role="img" aria-labelledby="fq-title fq-desc" preserveAspectRatio="xMidYMid meet">
  <title id="fq-title">Four questions that expose a lock-in</title>
  <desc id="fq-desc">A three-column matrix. Left column lists four questions to ask of any architecture decision. Middle column shows the kind of answer that means the decision is reversible. Right column shows the kind of answer that means it is locked in. Questions: Undo this in eighteen months. What bends around it. Who holds the keys. When is it wrong. A short, concrete answer means reversible; an answer that makes the room go quiet means locked in.</desc>

  <defs>
    <linearGradient id="fqBrandGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#E91E63"/>
      <stop offset="25%"  stop-color="#CC418C"/>
      <stop offset="50%"  stop-color="#9B59B6"/>
      <stop offset="70%"  stop-color="#7E6CE0"/>
      <stop offset="100%" stop-color="#3478E5"/>
    </linearGradient>
  </defs>

  <!-- Brand gradient eyebrow rule -->
  <rect x="24" y="14" width="48" height="2" rx="1" fill="url(#fqBrandGradient)"/>

  <!-- Mono caption -->
  <text x="24" y="40" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" letter-spacing="1.8" fill="#8A8A8A" font-weight="500">REVERSIBILITY LENS &#x00B7; FOUR QUESTIONS</text>

  <!-- Headline -->
  <text x="24" y="70" font-family="Poppins, system-ui, sans-serif" font-size="18" font-weight="600" fill="#1F1F1F" letter-spacing="-0.3">Four questions, and what the answers tell you</text>

  <!-- Column headers -->
  <!-- Reversible header pill -->
  <g>
    <rect x="300" y="92" width="260" height="42" rx="12" fill="#EEF6F1" stroke="#1D9E75" stroke-width="1"/>
    <circle cx="320" cy="113" r="3.5" fill="#1D9E75"/>
    <text x="332" y="117" font-family="Poppins, system-ui, sans-serif" font-size="13" font-weight="600" fill="#0F6B50" letter-spacing="-0.2">Reversible answer</text>
  </g>
  <!-- Locked-in header pill -->
  <g>
    <rect x="576" y="92" width="260" height="42" rx="12" fill="#FAEEF1" stroke="#BC2A52" stroke-width="1"/>
    <circle cx="596" cy="113" r="3.5" fill="#BC2A52"/>
    <text x="608" y="117" font-family="Poppins, system-ui, sans-serif" font-size="13" font-weight="600" fill="#761A36" letter-spacing="-0.2">Locked-in answer</text>
  </g>

  <!-- ============ ROW 1 ============ -->
  <!-- Q1 -->
  <g>
    <rect x="24" y="150" width="260" height="92" rx="10" fill="#F4F4F2" stroke="rgba(31,31,31,0.12)" stroke-width="1"/>
    <text x="42" y="180" font-family="Poppins, system-ui, sans-serif" font-size="16" font-weight="600" fill="#1F1F1F" letter-spacing="-0.3">Undo this in 18 months?</text>
    <text x="42" y="206" font-family="Roboto, system-ui, sans-serif" font-size="13" fill="#4A4A4A">What would it actually</text>
    <text x="42" y="224" font-family="Roboto, system-ui, sans-serif" font-size="13" fill="#4A4A4A">take to reverse it</text>
  </g>
  <!-- R1 -->
  <g>
    <rect x="300" y="150" width="260" height="92" rx="10" fill="#F2F8F4" stroke="rgba(29,158,117,0.22)" stroke-width="1"/>
    <text x="318" y="194" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#155B43">Short, concrete,</text>
    <text x="318" y="216" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#155B43">a known job</text>
  </g>
  <!-- L1 -->
  <g>
    <rect x="576" y="150" width="260" height="92" rx="10" fill="#FBF2F4" stroke="rgba(188,42,82,0.22)" stroke-width="1"/>
    <text x="594" y="194" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#761A36">&#x201C;It depends what</text>
    <text x="594" y="216" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#761A36">we&#x2019;ve built by then&#x201D;</text>
  </g>

  <!-- ============ ROW 2 ============ -->
  <!-- Q2 -->
  <g>
    <rect x="24" y="256" width="260" height="92" rx="10" fill="#F4F4F2" stroke="rgba(31,31,31,0.12)" stroke-width="1"/>
    <text x="42" y="286" font-family="Poppins, system-ui, sans-serif" font-size="16" font-weight="600" fill="#1F1F1F" letter-spacing="-0.3">What bends around it?</text>
    <text x="42" y="312" font-family="Roboto, system-ui, sans-serif" font-size="13" fill="#4A4A4A">How much of our system</text>
    <text x="42" y="330" font-family="Roboto, system-ui, sans-serif" font-size="13" fill="#4A4A4A">forms to fit this choice</text>
  </g>
  <!-- R2 -->
  <g>
    <rect x="300" y="256" width="260" height="92" rx="10" fill="#F2F8F4" stroke="rgba(29,158,117,0.22)" stroke-width="1"/>
    <text x="318" y="300" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#155B43">Stays contained,</text>
    <text x="318" y="322" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#155B43">touches little else</text>
  </g>
  <!-- L2 -->
  <g>
    <rect x="576" y="256" width="260" height="92" rx="10" fill="#FBF2F4" stroke="rgba(188,42,82,0.22)" stroke-width="1"/>
    <text x="594" y="300" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#761A36">Prompts, data, habits</text>
    <text x="594" y="322" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#761A36">all assume it</text>
  </g>

  <!-- ============ ROW 3 ============ -->
  <!-- Q3 -->
  <g>
    <rect x="24" y="362" width="260" height="92" rx="10" fill="#F4F4F2" stroke="rgba(31,31,31,0.12)" stroke-width="1"/>
    <text x="42" y="392" font-family="Poppins, system-ui, sans-serif" font-size="16" font-weight="600" fill="#1F1F1F" letter-spacing="-0.3">Who holds the keys?</text>
    <text x="42" y="418" font-family="Roboto, system-ui, sans-serif" font-size="13" fill="#4A4A4A">How much control sits</text>
    <text x="42" y="436" font-family="Roboto, system-ui, sans-serif" font-size="13" fill="#4A4A4A">outside the room</text>
  </g>
  <!-- R3 -->
  <g>
    <rect x="300" y="362" width="260" height="92" rx="10" fill="#F2F8F4" stroke="rgba(29,158,117,0.22)" stroke-width="1"/>
    <text x="318" y="406" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#155B43">Little, and cheap</text>
    <text x="318" y="428" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#155B43">to walk away from</text>
  </g>
  <!-- L3 -->
  <g>
    <rect x="576" y="362" width="260" height="92" rx="10" fill="#FBF2F4" stroke="rgba(188,42,82,0.22)" stroke-width="1"/>
    <text x="594" y="406" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#761A36">A vendor sets terms,</text>
    <text x="594" y="428" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#761A36">pricing, direction</text>
  </g>

  <!-- ============ ROW 4 ============ -->
  <!-- Q4 -->
  <g>
    <rect x="24" y="468" width="260" height="92" rx="10" fill="#F4F4F2" stroke="rgba(31,31,31,0.12)" stroke-width="1"/>
    <text x="42" y="498" font-family="Poppins, system-ui, sans-serif" font-size="16" font-weight="600" fill="#1F1F1F" letter-spacing="-0.3">When is it wrong?</text>
    <text x="42" y="524" font-family="Roboto, system-ui, sans-serif" font-size="13" fill="#4A4A4A">What would have to be</text>
    <text x="42" y="542" font-family="Roboto, system-ui, sans-serif" font-size="13" fill="#4A4A4A">true for this to fail</text>
  </g>
  <!-- R4 -->
  <g>
    <rect x="300" y="468" width="260" height="92" rx="10" fill="#F2F8F4" stroke="rgba(29,158,117,0.22)" stroke-width="1"/>
    <text x="318" y="512" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#155B43">Nothing realistic,</text>
    <text x="318" y="534" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#155B43">safe to decide fast</text>
  </g>
  <!-- L4 -->
  <g>
    <rect x="576" y="468" width="260" height="92" rx="10" fill="#FBF2F4" stroke="rgba(188,42,82,0.22)" stroke-width="1"/>
    <text x="594" y="512" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#761A36">Growth or new terms,</text>
    <text x="594" y="534" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#761A36">it&#x2019;s a bet, not a call</text>
  </g>

  <!-- Footer caption -->
  <text x="24" y="592" font-family="Roboto, system-ui, sans-serif" font-size="13" fill="#4A4A4A" font-style="italic">A short answer means reversible. An answer that makes the room go quiet means locked in.</text>
</svg>
