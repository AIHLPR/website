<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 610" role="img" aria-labelledby="ev-title ev-desc" preserveAspectRatio="xMidYMid meet">
  <title id="ev-title">Two kinds of evaluation</title>
  <desc id="ev-desc">A side-by-side comparison of offline and production evaluation across four dimensions: when each runs, what it compares against, what it measures, and the limit of each. Offline runs before the workflow meets live data and measures correctness against a known answer. Production runs continuously on never-seen inputs and measures behavioural properties against the earlier benchmark.</desc>

  <defs>
    <linearGradient id="evBrandGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#E91E63"/>
      <stop offset="25%"  stop-color="#CC418C"/>
      <stop offset="50%"  stop-color="#9B59B6"/>
      <stop offset="70%"  stop-color="#7E6CE0"/>
      <stop offset="100%" stop-color="#3478E5"/>
    </linearGradient>
  </defs>

  <!-- Brand gradient eyebrow rule -->
  <rect x="24" y="14" width="48" height="2" rx="1" fill="url(#evBrandGradient)"/>

  <!-- Mono caption -->
  <text x="24" y="40" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" letter-spacing="1.8" fill="#8A8A8A" font-weight="500">EVALUATION TYPES &#x00B7; OFFLINE VS PRODUCTION</text>

  <!-- Headline -->
  <text x="24" y="70" font-family="Poppins, system-ui, sans-serif" font-size="18" font-weight="600" fill="#1F1F1F" letter-spacing="-0.3">Two kinds of evaluation, two different jobs.</text>

  <!-- Header pills -->
  <!-- Offline (blue) -->
  <g>
    <rect x="24" y="92" width="410" height="42" rx="12" fill="#EEF3FB" stroke="#3478E5" stroke-width="1"/>
    <circle cx="44" cy="113" r="3.5" fill="#3478E5"/>
    <text x="56" y="117" font-family="Poppins, system-ui, sans-serif" font-size="13" font-weight="600" fill="#1F4D8E" letter-spacing="-0.2">Offline evaluation</text>
  </g>
  <!-- Production (pink) -->
  <g>
    <rect x="446" y="92" width="410" height="42" rx="12" fill="#FAEEF1" stroke="#BC2A52" stroke-width="1"/>
    <circle cx="466" cy="113" r="3.5" fill="#BC2A52"/>
    <text x="478" y="117" font-family="Poppins, system-ui, sans-serif" font-size="13" font-weight="600" fill="#761A36" letter-spacing="-0.2">Production evaluation</text>
  </g>

  <!-- ============ ROW 1: When ============ -->
  <text x="24" y="166" font-family="Poppins, system-ui, sans-serif" font-size="14" font-weight="600" fill="#1F1F1F" letter-spacing="-0.2">When</text>
  <!-- Offline -->
  <g>
    <rect x="24" y="178" width="410" height="64" rx="10" fill="#F2F8FC" stroke="rgba(52,120,229,0.22)" stroke-width="1"/>
    <text x="42" y="206" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#1F4D8E">Before the workflow meets</text>
    <text x="42" y="226" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#1F4D8E">live data.</text>
  </g>
  <!-- Production -->
  <g>
    <rect x="446" y="178" width="410" height="64" rx="10" fill="#FBF2F4" stroke="rgba(188,42,82,0.22)" stroke-width="1"/>
    <text x="464" y="206" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#761A36">Continuously, on live</text>
    <text x="464" y="226" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#761A36">never-seen inputs.</text>
  </g>

  <!-- ============ ROW 2: What it compares against ============ -->
  <text x="24" y="272" font-family="Poppins, system-ui, sans-serif" font-size="14" font-weight="600" fill="#1F1F1F" letter-spacing="-0.2">What it compares against</text>
  <!-- Offline -->
  <g>
    <rect x="24" y="284" width="410" height="64" rx="10" fill="#F2F8FC" stroke="rgba(52,120,229,0.22)" stroke-width="1"/>
    <text x="42" y="312" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#1F4D8E">A known correct answer,</text>
    <text x="42" y="332" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#1F4D8E">prepared in advance.</text>
  </g>
  <!-- Production -->
  <g>
    <rect x="446" y="284" width="410" height="64" rx="10" fill="#FBF2F4" stroke="rgba(188,42,82,0.22)" stroke-width="1"/>
    <text x="464" y="312" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#761A36">The behaviour pattern set</text>
    <text x="464" y="332" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#761A36">by the earlier benchmark.</text>
  </g>

  <!-- ============ ROW 3: What it measures ============ -->
  <text x="24" y="378" font-family="Poppins, system-ui, sans-serif" font-size="14" font-weight="600" fill="#1F1F1F" letter-spacing="-0.2">What it measures</text>
  <!-- Offline -->
  <g>
    <rect x="24" y="390" width="410" height="84" rx="10" fill="#F2F8FC" stroke="rgba(52,120,229,0.22)" stroke-width="1"/>
    <text x="42" y="420" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#1F4D8E">Correctness, directly &#x2014;</text>
    <text x="42" y="440" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#1F4D8E">is the output right?</text>
  </g>
  <!-- Production -->
  <g>
    <rect x="446" y="390" width="410" height="84" rx="10" fill="#FBF2F4" stroke="rgba(188,42,82,0.22)" stroke-width="1"/>
    <text x="464" y="414" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#761A36">Behavioural properties:</text>
    <text x="464" y="434" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#761A36">consistency, escalation,</text>
    <text x="464" y="454" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#761A36">drift, confidence alignment.</text>
  </g>

  <!-- ============ ROW 4: The limit ============ -->
  <text x="24" y="504" font-family="Poppins, system-ui, sans-serif" font-size="14" font-weight="600" fill="#1F1F1F" letter-spacing="-0.2">The limit</text>
  <!-- Offline -->
  <g>
    <rect x="24" y="516" width="410" height="52" rx="10" fill="#F2F8FC" stroke="rgba(52,120,229,0.22)" stroke-width="1"/>
    <text x="42" y="547" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#1F4D8E">A snapshot. Cannot see drift.</text>
  </g>
  <!-- Production -->
  <g>
    <rect x="446" y="516" width="410" height="52" rx="10" fill="#FBF2F4" stroke="rgba(188,42,82,0.22)" stroke-width="1"/>
    <text x="464" y="547" font-family="Roboto, system-ui, sans-serif" font-size="14" fill="#761A36">Cannot confirm exact correctness.</text>
  </g>

  <!-- Footer caption -->
  <text x="24" y="595" font-family="Roboto, system-ui, sans-serif" font-size="13" fill="#4A4A4A" font-style="italic">Offline proves the workflow is sound under known conditions. Production keeps it honest as conditions change.</text>
</svg>
